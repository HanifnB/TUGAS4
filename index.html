<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Diskon</title>
    <link rel="stylesheet" href="styling.css">

</head>
<body>

    <div class="calculator-card">
        <h2>Kalkulator Diskon</h2>
        
        <div class="input-group">
            <label for="hargaAsli">Harga Asli (Rp)</label>
            <input type="number" id="hargaAsli" placeholder="Contoh: 450000">
        </div>

        <div class="input-group">
            <label for="persenDiskon">Diskon (%)</label>
            <input type="number" id="persenDiskon" placeholder="Contoh: 75">
        </div>

        <button id="btnHitung">Hitung Harga</button>

        <div class="result-box">
            <p><span>Nilai Potongan:</span> <span id="nilaiPotongan">Rp 0</span></p>
            <div class="final-price" id="hargaAkhir">Rp 0</div>
        </div>
    </div>
    <script>
        const inputHarga = document.getElementById('hargaAsli');
        const inputDiskon = document.getElementById('persenDiskon');
        const btnHitung = document.getElementById('btnHitung');
        
        const teksPotongan = document.getElementById('nilaiPotongan');
        const teksHargaAkhir = document.getElementById('hargaAkhir');

        btnHitung.addEventListener('click', function() {
            const harga = parseFloat(inputHarga.value) || 0;
            const diskon = parseFloat(inputDiskon.value) || 0;

            if (diskon > 100 || diskon < 0) {
                alert("Persentase diskon harus antara 0 dan 100!");
                return; 
            }

            const nilaiPotongan = harga * (diskon / 100);
            const hargaAkhir = harga - nilaiPotongan;

            const formatPotongan = "Rp " + Math.round(nilaiPotongan).toLocaleString('id-ID');
            const formatAkhir = "Rp " + Math.round(hargaAkhir).toLocaleString('id-ID');

            teksPotongan.textContent = formatPotongan;
            teksHargaAkhir.textContent = formatAkhir;
        });
    </script>
</body>
</html>
